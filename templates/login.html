<!-- login.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — EngDocs</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0d1117;
  --surface:#161b22;
  --surface2:#21262d;
  --border:#30363d;
  --accent:#2f81f7;
  --text:#e6edf3;
  --text-dim:#8b949e;
  --green:#3fb950;
  --red:#f85149;
  --radius:12px;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:1rem;
}

.wrap{
  width:100%;
  max-width:420px;
}

.brand{
  text-align:center;
  margin-bottom:20px;
}

.brand-logo{
  width:220px;
  max-width:100%;
  margin-bottom:10px;
}

.sub{
  text-align:center;
  color:var(--text-dim);
  font-size:14px;
  margin-bottom:24px;
}

.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px;
  padding:28px 24px;
  box-shadow:0 20px 50px rgba(0,0,0,.35);
}

.form-group{
  margin-bottom:16px;
}

label{
  display:block;
  font-size:11px;
  font-weight:600;
  color:var(--text-dim);
  margin-bottom:6px;
  text-transform:uppercase;
  letter-spacing:.5px;
}

input{
  width:100%;
  height:48px;
  background:var(--surface2);
  border:1px solid var(--border);
  color:var(--text);
  padding:0 14px;
  border-radius:12px;
  font-size:14px;
  outline:none;
  transition:.2s;
}

input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(47,129,247,.12);
}

.btn{
  width:100%;
  height:48px;
  border:none;
  border-radius:12px;
  background:var(--accent);
  color:#fff;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  transition:.2s;
  margin-top:6px;
}

.btn:hover{
  transform:translateY(-1px);
}

.links{
  text-align:center;
  margin-top:16px;
  font-size:13px;
}

.links a{
  color:var(--accent);
  text-decoration:none;
}

.links a:hover{
  text-decoration:underline;
}

.flash{
  padding:.7rem .9rem;
  border-radius:var(--radius);
  margin-bottom:1rem;
  font-size:13px;
}

.flash.erro{
  background:rgba(248,81,73,.1);
  border:1px solid rgba(248,81,73,.3);
  color:var(--red);
}

.flash.sucesso{
  background:rgba(63,185,80,.1);
  border:1px solid rgba(63,185,80,.3);
  color:var(--green);
}

.flash.info{
  background:rgba(47,129,247,.1);
  border:1px solid rgba(47,129,247,.3);
  color:var(--accent);
}
</style>
</head>

<body>

<div class="wrap">

  <div class="brand">
    <img src="{{ url_for('static', filename='uploads/logo.png') }}" class="brand-logo">
    <p class="sub">Sistema de gestão de documentos de engenharia</p>
  </div>

  {% for cat,msg in get_flashed_messages(with_categories=true) %}
  <div class="flash {{ cat }}">{{ msg }}</div>
  {% endfor %}

  <div class="card">
    <form method="POST">

      <div class="form-group">
        <label>E-mail</label>
        <input type="email" name="email" required placeholder="seu@email.com">
      </div>

      <div class="form-group">
        <label>Senha</label>
        <input type="password" name="senha" required placeholder="••••••••">
      </div>

      <button type="submit" class="btn">Entrar</button>

    </form>

    <div class="links">
      <a href="{{ url_for('recuperar_senha') }}">Esqueci a senha</a>

      <p style="margin-top:10px; color:var(--text-dim);">
        Solicite seu acesso ao administrador do sistema.
      </p>
    </div>

  </div>

</div>

</body>
</html>
