{% extends "_auth_base.html" %}
{% block title %}Nova senha — EngDocs{% endblock %}
{% block body %}
<div class="wrap" style="max-width:380px">
  <div class="logo">Eng<span>Docs</span></div>
  <p class="sub">Definir nova senha</p>
  {% for cat,msg in get_flashed_messages(with_categories=true) %}
  <div class="flash {{ cat }}">{{ msg }}</div>{% endfor %}
  <div class="card">
    <form method="POST">
      <div class="form-group"><label>Nova senha</label>
        <input type="password" name="senha" required autofocus placeholder="Mínimo 6 caracteres" minlength="6"></div>
      <button type="submit" class="btn">Salvar nova senha</button>
    </form>
  </div>
</div>
{% endblock %}
