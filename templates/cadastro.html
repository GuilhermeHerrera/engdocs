{% extends "_auth_base.html" %}
{% block title %}Cadastro — EngDocs{% endblock %}
{% block body %}
<div class="wrap">
  <div class="logo">Eng<span>Docs</span></div>
  <p class="sub">Criar nova conta</p>
  {% for cat,msg in get_flashed_messages(with_categories=true) %}
  <div class="flash {{ cat }}">{{ msg }}</div>{% endfor %}
  <div class="card">
    <form method="POST">
      <div class="form-group"><label>Nome completo</label>
        <input type="text" name="nome" required autofocus placeholder="Seu nome completo"></div>
      <div class="form-group"><label>E-mail</label>
        <input type="email" name="email" required placeholder="seu@email.com"></div>
      <div class="form-group"><label>Senha <span style="color:var(--text-dim);font-weight:400">(mín. 6 caracteres)</span></label>
        <input type="password" name="senha" required placeholder="••••••••" minlength="6"></div>
      <div class="form-group">
        <label>Tipo de acesso</label>
        <div class="tipo-grid">
          <div class="tipo-opt">
            <input type="radio" name="tipo" id="t-admin" value="admin">
            <label for="t-admin"><span class="ic">🔑</span>Admin</label>
          </div>
          <div class="tipo-opt">
            <input type="radio" name="tipo" id="t-eng" value="engenheiro" checked>
            <label for="t-eng"><span class="ic">⚙️</span>Engenheiro</label>
          </div>
          <div class="tipo-opt">
            <input type="radio" name="tipo" id="t-vis" value="visualizador">
            <label for="t-vis"><span class="ic">👁️</span>Visualizador</label>
          </div>
        </div>
      </div>
      <button type="submit" class="btn">Criar conta</button>
    </form>
    <div class="link-back"><a href="{{ url_for('login') }}">← Voltar ao login</a></div>
  </div>
</div>
{% endblock %}
