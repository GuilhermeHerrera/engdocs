<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}EngDocs{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#06111f;
  --bg2:#0a1728;
  --surface:rgba(17,26,38,.94);
  --surface2:#111827;
  --border:rgba(255,255,255,.08);
  --accent:#3b82f6;
  --accent-hover:#2563eb;
  --text:#e6edf3;
  --text-dim:#94a3b8;
  --green:#3fb950;
  --red:#f85149;
  --radius:14px;
}

body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  font-family:'Inter',sans-serif;
  background:#020817;
  color:#e5e7eb;
}

.wrap{
  width:100%;
  max-width:420px;
}

.card{
  width:100%;
  background:#0f172a;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:20px;
  padding:30px 26px;
  box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

.logo{
  text-align:center;
  font-size:28px;
  font-weight:700;
  color:#3b82f6;
  margin-bottom:8px;
}

.logo span{
  color:var(--text);
}

.sub{
  text-align:center;
  color:var(--text-dim);
    color:#94a3b8;
  font-size:14px;
  line-height:1.5;
  margin-bottom:24px;
}

.form-group{
  margin-bottom:16px;
}

.form-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

label{
  display:block;
  font-size:11px;
  font-weight:600;
  color:var(--text-dim);
  margin-bottom:8px;
  text-transform:uppercase;
  letter-spacing:.5px;
}

input{
  width:100%;
  height:48px;
  border-radius:12px;
  border:1px solid #334155;
  background:#020617;
  color:white;
  padding:0 14px;
  font-size:14px;
  outline:none;
  transition:.2s;
}

input:focus{
  border-color:#3b82f6;
  box-shadow:0 0 0 3px rgba(59,130,246,.15);
}

.btn{
  width:100%;
  height:48px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#2563eb,#3b82f6);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:.2s;
}

.btn:hover{
  transform:translateY(-1px);
  background:linear-gradient(90deg, var(--accent-hover), var(--accent));
}

.link-back{
  text-align:center;
  margin-top:18px;
  font-size:13px;
}

.link-back a{
  color:#60a5fa;
  text-decoration:none;
}

.link-back a:hover{
  text-decoration:underline;
}

.flash{
  padding:12px 14px;
  border-radius:12px;
  margin-bottom:14px;
  font-size:13px;
}

.flash.erro{
  background:rgba(248,81,73,.1);
  border:1px solid rgba(248,81,73,.3);
  color:var(--red);
}

.flash.sucesso{
  background:rgba(63,185,80,.1);
  border:1px solid rgba(63,185,80,.3);
  color:var(--green);
}

.flash.info{
  background:rgba(59,130,246,.1);
  border:1px solid rgba(59,130,246,.3);
  color:#60a5fa;
}

.tipo-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

.tipo-opt input[type=radio]{
  display:none;
}

.tipo-opt label{
  cursor:pointer;
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px 8px;
  text-align:center;
  transition:.15s;
  display:block;
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.3px;
}

.tipo-opt input[type=radio]:checked+label{
  border-color:var(--accent);
  background:rgba(59,130,246,.12);
  color:#60a5fa;
}

.tipo-opt label .ic{
  font-size:1.25rem;
  display:block;
  margin-bottom:4px;
}

@media (max-width: 600px){
  .card{
    padding:24px 20px;
    border-radius:20px;
  }

  .form-row{
    grid-template-columns:1fr;
  }

  .logo{
    font-size:24px;
  }

  .sub{
    font-size:14px;
  }
}
</style>
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
